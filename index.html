// ── Supabase Auth ──────────────────────────────────────────
const sbAuth = {
  async signUp(email, senha, nome, tipo) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password: senha, data: { nome, tipo } })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.msg || d.error_description || "Erro ao cadastrar");
    return d;
  },
  async signIn(email, senha) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password: senha })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.msg || d.error_description || "Email ou senha incorretos");
    return d;
  },
  async signOut(token) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
  },
  async recuperarSenha(email) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.msg || d.error_description || "Erro ao enviar email");
    return d;
  }
};

// ── REST API ───────────────────────────────────────────────
const api = async (path, token, opts = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json",
      Prefer: opts.prefer !== undefined ? opts.prefer : "return=representation",
    },
    ...opts,
  });
  const text = await res.text();
  if (!res.ok) throw new Error(text);
  return text ? JSON.parse(text) : [];
};

// ── Upload de imagem (Supabase Storage) ─────────────────────
const uploadImagem = async (file, token) => {
  const ext = file.name.split(".").pop();
  const nomeArquivo = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/chat-imagens/${nomeArquivo}`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${token}`,
      "Content-Type": file.type,
    },
    body: file,
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(t || "Erro ao enviar imagem");
  }
  return `${SUPABASE_URL}/storage/v1/object/public/chat-imagens/${nomeArquivo}`;
};

// ── Componente Input ───────────────────────────────────────

// ── Componente Botão ───────────────────────────────────────
function Btn({ onClick, children, variant="primary", disabled, style: extraStyle }) {
  const base = {
    border:"none", borderRadius:12, padding:"13px 20px", fontWeight:800,
    fontSize:15, cursor: disabled ? "not-allowed" : "pointer", width:"100%",
    opacity: disabled ? 0.6 : 1, ...extraStyle
  };
  const vars = {
    primary: { background:"linear-gradient(135deg,#4CAF8A,#3A9B7A)", color:"white" },
    ghost:   { background:"#F0EDE8", color:"#2D2A26" },
    danger:  { background:"#FEE2E2", color:"#E76F86" },
  };
  return (
    <button onClick={disabled ? undefined : onClick} style={{ ...base, ...vars[variant] }}>
      {children}
    </button>
  );
}

// ── Tela Login ─────────────────────────────────────────────
function TelaLogin({ onLogin }) {
  const [tela, setTela] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [senha, setSenha] = React.useState("");
  const [senhaConfirm, setSenhaConfirm] = React.useState("");
  const [nome, setNome] = React.useState("");
  const [tipo, setTipo] = React.useState("responsavel");
  const [erro, setErro] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [sucesso, setSucesso] = React.useState("");

  const limpar = () => { setErro(""); setSucesso(""); };

  const entrar = async () => {
    if (!email || !senha) { setErro("Preencha email e senha."); return; }
    setLoading(true); setErro("");
    try {
      const session = await sbAuth.signIn(email, senha);
      const perfis = await api(`usuarios?id=eq.${session.user.id}`, session.access_token);
      const perfil = perfis[0];
      if (!perfil) throw new Error("Perfil não encontrado. Contate o suporte.");
      onLogin({ session, perfil });
    } catch(e) {
      setErro(e.message);
    } finally {
      setLoading(false);
    }
  };

  const cadastrar = async () => {
    if (!nome || !email || !senha || !senhaConfirm) { setErro("Preencha todos os campos."); return; }
    if (senha.length < 6) { setErro("A senha deve ter ao menos 6 caracteres."); return; }
    if (senha !== senhaConfirm) { setErro("As senhas não coincidem."); return; }
    setLoading(true); setErro("");
    try {
      await sbAuth.signUp(email, senha, nome, tipo);
      setSucesso("Cadastro realizado! Verifique seu email para confirmar a conta.");
      setTela("login");
    } catch(e) {
      setErro(e.message);
    } finally {
      setLoading(false);
    }
  };

  const recuperarSenha = async () => {
    if (!email) { setErro("Digite seu email para recuperar a senha."); return; }
    setLoading(true); setErro("");
    try {
      await sbAuth.recuperarSenha(email);
      setSucesso("Email enviado! Verifique sua caixa de entrada.");
      setTela("login");
    } catch(e) {
      setErro(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#4CAF8A 0%,#2E7D62 100%)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ width:"100%", maxWidth:380 }}>

        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:52, marginBottom:8 }}>📚</div>
          <div style={{ color:"white", fontSize:26, fontWeight:800 }}>Agenda Escolar</div>
          <div style={{ color:"rgba(255,255,255,0.7)", fontSize:14, marginTop:4 }}>Diário da Turma</div>
        </div>

        <div style={{ background:"white", borderRadius:20, padding:28,
          boxShadow:"0 8px 32px rgba(0,0,0,0.15)" }}>

          {tela !== "recuperar" && (
            <div style={{ display:"flex", background:"#F0EDE8", borderRadius:12,
              padding:4, marginBottom:24, gap:4 }}>
              {[["login","Entrar"],["cadastro","Criar conta"]].map(([v,l]) => (
                <button key={v} onClick={() => { setTela(v); limpar(); }}
                  style={{ flex:1, border:"none", borderRadius:9, padding:"9px 0",
                    fontWeight:700, fontSize:14, cursor:"pointer",
                    background: tela===v ? "white" : "transparent",
                    color: tela===v ? "#2D2A26" : "#9A9590",
                    boxShadow: tela===v ? "0 1px 4px rgba(0,0,0,0.1)" : "none" }}>
                  {l}
                </button>
              ))}
            </div>
          )}

          {sucesso && (
            <div style={{ background:"#D1FAE5", border:"2px solid #4CAF8A", borderRadius:12,
              padding:"12px 14px", marginBottom:16, fontSize:13, color:"#065F46", fontWeight:600 }}>
              {sucesso}
            </div>
          )}

          {tela === "login" && (
            <div>
              <Input label="Email" type="email" value={email}
                onChange={e => { setEmail(e.target.value); limpar(); }}
                placeholder="seu@email.com" />
              <Input label="Senha" type="password" value={senha}
                onChange={e => { setSenha(e.target.value); limpar(); }}
                placeholder="••••••••" onKeyDown={e => e.key==="Enter" && entrar()}
                error={erro} />
              <Btn onClick={entrar} disabled={loading}>
                {loading ? "Entrando..." : "Entrar"}
              </Btn>
              <button onClick={() => { setTela("recuperar"); limpar(); }}
                style={{ width:"100%", background:"none", border:"none", marginTop:14,
                  color:"#9A9590", fontSize:13, fontWeight:600, cursor:"pointer",
                  textDecoration:"underline" }}>
                Esqueci minha senha
              </button>
            </div>
          )}

          {tela === "cadastro" && (
            <div>
              <Input label="Nome completo" value={nome}
                onChange={e => { setNome(e.target.value); limpar(); }}
                placeholder="Seu nome" />
              <Input label="Email" type="email" value={email}
                onChange={e => { setEmail(e.target.value); limpar(); }}
                placeholder="seu@email.com" />
              <Input label="Senha" type="password" value={senha}
                onChange={e => { setSenha(e.target.value); limpar(); }}
                placeholder="Mínimo 6 caracteres" />
              <Input label="Confirmar senha" type="password" value={senhaConfirm}
                onChange={e => { setSenhaConfirm(e.target.value); limpar(); }}
                placeholder="Digite a senha novamente"
                error={senhaConfirm && senha !== senhaConfirm ? "As senhas não coincidem." : ""} />
              <div style={{ marginBottom:18 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#6A6560", marginBottom:8,
                  textTransform:"uppercase", letterSpacing:0.8 }}>Tipo de conta</div>
                <div style={{ display:"flex", gap:8 }}>
                  {[["responsavel","👨‍👩‍👧 Responsável"],["professor","👩‍🏫 Professor"],["coordenacao","🏫 Coordenação"]].map(([v,l]) => (
                    <button key={v} onClick={() => setTipo(v)}
                      style={{ flex:1, border:`2px solid ${tipo===v ? "#4CAF8A" : "#E8E5E0"}`,
                        borderRadius:12, padding:"11px 6px", fontWeight:700, fontSize:12,
                        cursor:"pointer", background: tipo===v ? "#F0FFF8" : "white",
                        color: tipo===v ? "#3A9B7A" : "#6A6560" }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              {erro && (
                <div style={{ color:"#E76F86", fontSize:13, fontWeight:600, marginBottom:12 }}>{erro}</div>
              )}
              <Btn onClick={cadastrar} disabled={loading}>
                {loading ? "Cadastrando..." : "Criar conta"}
              </Btn>
            </div>
          )}

          {tela === "recuperar" && (
            <div>
              <div style={{ textAlign:"center", marginBottom:20 }}>
                <div style={{ fontSize:36, marginBottom:8 }}>🔑</div>
                <div style={{ fontWeight:800, fontSize:16 }}>Recuperar senha</div>
                <div style={{ fontSize:13, color:"#9A9590", marginTop:4 }}>
                  Digite seu email e enviaremos um link para redefinir sua senha.
                </div>
              </div>
              <Input label="Email" type="email" value={email}
                onChange={e => { setEmail(e.target.value); limpar(); }}
                placeholder="seu@email.com"
                onKeyDown={e => e.key==="Enter" && recuperarSenha()}
                error={erro} />
              <Btn onClick={recuperarSenha} disabled={loading}>
                {loading ? "Enviando..." : "Enviar link de recuperação"}
              </Btn>
              <button onClick={() => { setTela("login"); limpar(); }}
                style={{ width:"100%", background:"none", border:"none", marginTop:14,
                  color:"#9A9590", fontSize:13, fontWeight:600, cursor:"pointer",
                  textDecoration:"underline" }}>
                Voltar para o login
              </button>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// ── Componente Chat ────────────────────────────────────────
function TelaChat({ alunos, perfil, chatAluno, setChatAluno,

  const fileInputRef = React.useRef(null);

  const escolherImagem = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      alert("Imagem muito grande. Máximo 5MB.");
      return;
    }
    setImagemSel(file);
    setPreviewUrl(URL.createObjectURL(file));
    e.target.value = "";
  };

  const removerPreview = () => {
    setImagemSel(null);
    if (previewUrl) URL.revokeObjectURL(previewUrl);
    setPreviewUrl(null);
  };

  const handleEnviar = async () => {
    await enviarMensagem(imagemSel);
    removerPreview();
  };

                  <div style={{ maxWidth:"78%" }}>
                    {!isMinha && (
                      <div style={{ fontSize:11, fontWeight:700, color:"#9A9590",
                        marginBottom:3, display:"flex", alignItems:"center", gap:6 }}>
                        {(() => {
                          const t = m.autor && m.autor.tipo;
                          const cfg = t === "professor" ? { bg:"#4CAF8A20", fg:"#3A9B7A", label:"Professor" }
                            : t === "coordenacao" ? { bg:"#F9C74F30", fg:"#B8860B", label:"Coordenação" }
                            : { bg:"#7EC8E320", fg:"#4A8FA8", label:"Responsável" };
                          return (
                            <span style={{ background:cfg.bg, color:cfg.fg,
                              borderRadius:6, padding:"1px 6px", fontSize:10 }}>
                              {cfg.label}
                            </span>
                          );
                        })()}
                        {m.autor && m.autor.nome}
                      </div>
                    )}
                    <div style={{
                      background: isMinha ? "linear-gradient(135deg,#4CAF8A,#3A9B7A)" : "white",
                      color: isMinha ? "white" : "#2D2A26",
                      borderRadius: isMinha ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                      padding: m.imagem_url ? 6 : "10px 14px", fontSize:14, lineHeight:1.45,
                      boxShadow:"0 2px 6px rgba(0,0,0,0.08)" }}>
                      {m.imagem_url && (
                        <img src={m.imagem_url} alt="Imagem enviada"
                          style={{ width:"100%", maxWidth:240, borderRadius:10,
                            display:"block", marginBottom: m.conteudo ? 6 : 0 }}
                          onClick={() => window.open(m.imagem_url, "_blank")} />
                      )}
                      {m.conteudo && (
                        <div style={{ padding: m.imagem_url ? "0 6px 4px" : 0 }}>{m.conteudo}</div>
                      )}
                    </div>
                    <div style={{ fontSize:10, color:"#B0ABA5", marginTop:3,
                      textAlign: isMinha ? "right" : "left" }}>
                      {formatarHora(m.created_at)}
                      {isMinha && (
                        <span style={{ marginLeft:4 }}>
                          {m.lida_por && m.lida_por.length > 1 ? " ✓✓" : " ✓"}
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        <div ref={chatEndRef} />
      </div>

      {/* Preview de imagem selecionada */}
      {previewUrl && (
        <div style={{ background:"white", borderRadius:16, padding:10, marginBottom:8,
          boxShadow:"0 2px 8px rgba(0,0,0,0.06)", display:"flex", alignItems:"center", gap:10 }}>
          <img src={previewUrl} alt="Pré-visualização"
            style={{ width:56, height:56, borderRadius:10, objectFit:"cover" }} />
          <div style={{ flex:1, fontSize:12, color:"#6A6560", fontWeight:600 }}>
            Imagem selecionada
          </div>
          <button onClick={removerPreview}
            style={{ background:"#FEE2E2", border:"none", borderRadius:8,
              color:"#E76F86", width:32, height:32, cursor:"pointer", fontWeight:700, fontSize:14 }}>
            ✕
          </button>
        </div>
      )}

      {/* Campo envio */}
      <div style={{ display:"flex", gap:10, alignItems:"flex-end",
        background:"white", borderRadius:16, padding:12,
        boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
        <input ref={fileInputRef} type="file" accept="image/*" onChange={escolherImagem}
          style={{ display:"none" }} />
        <button
          onClick={() => fileInputRef.current && fileInputRef.current.click()}
          disabled={enviando}
          style={{ background:"#F0EDE8", border:"none", borderRadius:12, width:44, height:44,
            color:"#6A6560", cursor: enviando ? "default" : "pointer",
            fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          📎
        </button>
        <textarea
          value={novaMensagem}
          onChange={e => setNovaMensagem(e.target.value)}
          onKeyDown={e => {
            if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); handleEnviar(); }
          }}
          placeholder="Digite uma mensagem..."
          rows={1}
          style={{ flex:1, border:"2px solid #E8E5E0", borderRadius:12,
            padding:"10px 14px", fontSize:14, resize:"none",
            background:"#FAFAF8", color:"#2D2A26", lineHeight:1.4 }}
        />
        <button
          onClick={handleEnviar}
          disabled={(!novaMensagem.trim() && !imagemSel) || enviando}
          style={{ background: (novaMensagem.trim() || imagemSel) ? "linear-gradient(135deg,#4CAF8A,#3A9B7A)" : "#E8E5E0",
            border:"none", borderRadius:12, width:44, height:44,
            color: (novaMensagem.trim() || imagemSel) ? "white" : "#B0ABA5",
            cursor: (novaMensagem.trim() || imagemSel) ? "pointer" : "default",
            fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          {enviando ? "⏳" : "➤"}
        </button>
      </div>
    </div>
  );
}

// ── Componente: Perfil de Segurança do Aluno ────────────────
function PerfilSeguranca({ aluno, podeEditar, onSalvar }) {
  const [editando, setEditando] = React.useState(false);
  const [form, setForm] = React.useState({});
  const [salvando, setSalvando] = React.useState(false);

  React.useEffect(() => {
    if (editando) {
      const init = {};
      CAMPOS_SEGURANCA.forEach(c => { init[c.id] = aluno[c.id] || ""; });
      setForm(init);
    }
  }, [editando, aluno]);

  const salvar = async () => {
    setSalvando(true);
    try {
      await onSalvar(form);
      setEditando(false);
    } finally {
      setSalvando(false);
    }
  };

  const formatarData = (iso) => {
    if (!iso) return "";
    const [y,m,d] = iso.split("-");
    return `${d}/${m}/${y}`;
  };

  const camposPreenchidos = CAMPOS_SEGURANCA.filter(c => aluno[c.id]);

  return (
    <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid #F0EDE8" }}>
      {!editando && (
        <div>
          {camposPreenchidos.length === 0 ? (
            <div style={{ color:"#B0ABA5", fontSize:13, padding:"8px 0" }}>
              Nenhuma informação de segurança cadastrada.
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {camposPreenchidos.map(c => (
                <div key={c.id}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#9A9590",
                    textTransform:"uppercase", letterSpacing:0.6 }}>{c.label}</div>
                  <div style={{ fontSize:14, color:"#2D2A26", marginTop:2, whiteSpace:"pre-wrap" }}>
                    {c.tipo === "date" ? formatarData(aluno[c.id]) : aluno[c.id]}
                  </div>
                </div>
              ))}
            </div>
          )}
          {podeEditar && (
            <button onClick={() => setEditando(true)}
              style={{ marginTop:14, background:"#F0FFF8", border:"2px solid #4CAF8A30",
                borderRadius:10, padding:"8px 16px", color:"#3A9B7A", fontWeight:700,
                fontSize:13, cursor:"pointer" }}>
              {camposPreenchidos.length === 0 ? "➕ Preencher informações" : "✏️ Editar informações"}
            </button>
          )}
        </div>
      )}

      {editando && (
        <div>
          {CAMPOS_SEGURANCA.map(c => (
            <div key={c.id} style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#6A6560", marginBottom:5,
                textTransform:"uppercase", letterSpacing:0.8 }}>{c.label}</div>
              {c.tipo === "textarea" ? (
                <textarea
                  value={form[c.id] || ""}
                  onChange={e => setForm(prev => ({ ...prev, [c.id]: e.target.value }))}
                  placeholder={c.placeholder || ""}
                  rows={2}
                  style={{ width:"100%", border:"2px solid #E8E5E0", borderRadius:12,
                    padding:"10px 14px", fontSize:14, resize:"vertical",
                    background:"#FAFAF8", color:"#2D2A26" }}
                />
              ) : c.tipo === "select" ? (
                <select
                  value={form[c.id] || ""}
                  onChange={e => setForm(prev => ({ ...prev, [c.id]: e.target.value }))}
                  style={{ width:"100%", border:"2px solid #E8E5E0", borderRadius:12,
                    padding:"10px 14px", fontSize:14, background:"#FAFAF8", color:"#2D2A26" }}>
                  <option value="">Selecione...</option>
                  {c.opcoes.map(op => <option key={op} value={op}>{op}</option>)}
                </select>
              ) : (
                <input
                  type={c.tipo}
                  value={form[c.id] || ""}
                  onChange={e => setForm(prev => ({ ...prev, [c.id]: e.target.value }))}
                  placeholder={c.placeholder || ""}
                  style={{ width:"100%", border:"2px solid #E8E5E0", borderRadius:12,
                    padding:"10px 14px", fontSize:14, background:"#FAFAF8", color:"#2D2A26" }}
                />
              )}
            </div>
          ))}
          <div style={{ display:"flex", gap:10 }}>
            <Btn variant="ghost" onClick={() => setEditando(false)} style={{ flex:1 }}>Cancelar</Btn>
            <Btn onClick={salvar} disabled={salvando} style={{ flex:1 }}>
              {salvando ? "Salvando..." : "Salvar"}
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App Principal ──────────────────────────────────────────
function App() {
  const [authData,   setAuthData]   = React.useState(null);
  const [dataSel,    setDataSel]    = React.useState(new Date());
  const [alunos,     setAlunos]     = React.useState([]);
  const [alunoSel,   setAlunoSel]   = React.useState(null);
  const [relatorios, setRelatorios] = React.useState([]);
  const [aba,        setAba]        = React.useState("relatorio");
  const [catAberta,  setCatAberta]  = React.useState(null);
  const [statusMsg,  setStatusMsg]  = React.useState(null);
  const [carregando, setCarregando] = React.useState(false);
  const [erroConexao,setErroConexao]= React.useState("");

  // Alunos
  const [novoNome,  setNovoNome]  = React.useState("");
  const [novoEmail, setNovoEmail] = React.useState("");
  const [erroAluno, setErroAluno] = React.useState("");
  const [alunoExpandido, setAlunoExpandido] = React.useState(null);

  // Turmas
  const [turmas,        setTurmas]        = React.useState([]);
  const [todasTurmas,   setTodasTurmas]   = React.useState([]);
  const [turmaSel,      setTurmaSel]      = React.useState(null);
  const [novaTurmaNome, setNovaTurmaNome] = React.useState("");
  const [novaTurmaDesc, setNovaTurmaDesc] = React.useState("");
  const [erroTurma,     setErroTurma]     = React.useState("");
  const [professores,   setProfessores]   = React.useState([]);
  const [emailConvite,  setEmailConvite]  = React.useState({});
  const [convites,      setConvites]      = React.useState([]);
  const [solicitacoes,  setSolicitacoes]  = React.useState([]);
  const [naoLidasAdmin, setNaoLidasAdmin] = React.useState(0);
  const [solEmailCoord, setSolEmailCoord] = React.useState("");
  const [solAlunoId,    setSolAlunoId]    = React.useState("");
  const [turmaPorSol,   setTurmaPorSol]  = React.useState({});

  // Criar aluno (responsável)
  const [novoAlunoNome, setNovoAlunoNome] = React.useState("");
  const [erroNovoAluno, setErroNovoAluno] = React.useState("");

  // Escolas (coordenação)
  const [escolas,       setEscolas]       = React.useState([]);
  const [escolaAtualId, setEscolaAtualId] = React.useState(null);
  const [novaEscolaNome, setNovaEscolaNome] = React.useState("");
  const [erroEscola,    setErroEscola]    = React.useState("");
  const [criandoEscola, setCriandoEscola] = React.useState(false);

  // Chat
  const [mensagens,    setMensagens]    = React.useState([]);
  const [chatAluno,    setChatAluno]    = React.useState(null);
  const [novaMensagem, setNovaMensagem] = React.useState("");
  const [enviando,     setEnviando]     = React.useState(false);
  const [naoLidas,     setNaoLidas]     = React.useState(0);
  const chatEndRef = React.useRef(null);

  const token       = authData && authData.session ? authData.session.access_token : null;
  const perfil      = authData ? authData.perfil : null;
  const isProfessor   = perfil && perfil.tipo === "professor";
  const isCoordenacao = perfil && perfil.tipo === "coordenacao";
  const isResponsavel = perfil && perfil.tipo === "responsavel";
  const podeVerTudo   = isProfessor || isCoordenacao;
  const podeEditarRelatorio = isProfessor;

  const showStatus = (msg, tipo) => {
    setStatusMsg({ msg, tipo: tipo || "ok" });
    setTimeout(() => setStatusMsg(null), 2500);
  };

  // Preserva a posição de scroll durante atualizações de estado
  const manterScroll = (fn) => {
    const y = window.scrollY;
    fn();
    requestAnimationFrame(() => window.scrollTo(0, y));
  };

  // ── Carregar alunos ──────────────────────────────────────
  const carregarAlunos = React.useCallback(async () => {
    if (!token) return;
    try {
      const data = await api("alunos?select=*,responsavel:responsavel_id(nome,email)&order=nome", token);
      setAlunos(data);
      setErroConexao("");
      setAlunoSel(prev => prev || (data[0] ? data[0].id : null));
    } catch(e) {
      setErroConexao("Erro ao carregar alunos: " + e.message);
    }
  }, [token]);

  // ── Carregar relatórios ──────────────────────────────────
  const carregarRelatorios = React.useCallback(async () => {
    if (!token || !alunoSel) return;
    setCarregando(true);
    try {
      const data = await api(`relatorios?aluno_id=eq.${alunoSel}&data=eq.${toKey(dataSel)}`, token);
      setRelatorios(data);
    } catch(e) {
      console.error(e);
    } finally {
      setCarregando(false);
    }
  }, [token, alunoSel, dataSel]);

  // ── Carregar mensagens ───────────────────────────────────
  const carregarMensagens = React.useCallback(async () => {
    if (!token) return;
    try {
      const filtro = chatAluno
        ? `mensagens?aluno_id=eq.${chatAluno}&select=*,autor:autor_id(nome,tipo)&order=created_at.asc`
        : `mensagens?aluno_id=is.null&select=*,autor:autor_id(nome,tipo)&order=created_at.asc`;
      const data = await api(filtro, token);
      setMensagens(data);
    } catch(e) {
      console.error(e);
    }
  }, [token, chatAluno]);

  // ── Contar não lidas ─────────────────────────────────────
  const contarNaoLidas = React.useCallback(async () => {
    if (!token || !perfil) return;
    try {
      const data = await api(`mensagens?select=id,lida_por,autor_id&autor_id=neq.${perfil.id}`, token);
      const count = data.filter(m => !m.lida_por || !m.lida_por.includes(perfil.id)).length;
      setNaoLidas(count);
    } catch(e) {}
  }, [token, perfil]);

  // ── Marcar como lidas ────────────────────────────────────
  const marcarComoLidas = React.useCallback(async (msgs) => {
    if (!token || !perfil) return;
    const pendentes = msgs.filter(m =>
      m.autor_id !== perfil.id && (!m.lida_por || !m.lida_por.includes(perfil.id))
    );
    for (const m of pendentes) {
      try {
        const novaLista = m.lida_por ? [...m.lida_por, perfil.id] : [perfil.id];
        await api(`mensagens?id=eq.${m.id}`, token, {
          method: "PATCH",
          body: JSON.stringify({ lida_por: novaLista })
        });
      } catch(e) {}
    }
    if (pendentes.length > 0) setNaoLidas(0);
  }, [token, perfil]);

  // ── Enviar mensagem ──────────────────────────────────────
  const enviarMensagem = async (arquivoImagem) => {
    const texto = novaMensagem.trim();
    if (!texto && !arquivoImagem) return;
    if (enviando) return;
    setEnviando(true);
    try {
      let imagem_url = null;
      if (arquivoImagem) {
        imagem_url = await uploadImagem(arquivoImagem, token);
      }
      await api("mensagens", token, {
        method: "POST",
        body: JSON.stringify({
          aluno_id: chatAluno || null,
          autor_id: perfil.id,
          conteudo: texto,
          imagem_url,
          lida_por: [perfil.id]
        })
      });
      setNovaMensagem("");
      await carregarMensagens();
    } catch(e) {
      showStatus("Erro ao enviar", "erro");
    } finally {
      setEnviando(false);
    }
  };

  // ── Effects ──────────────────────────────────────────────
  React.useEffect(() => { if (token) carregarAlunos(); }, [token]);
  React.useEffect(() => { if (token && isCoordenacao) carregarEscolas(); }, [token, isCoordenacao]);
  React.useEffect(() => { if (token && isCoordenacao && escolaAtualId) { carregarTurmas(); carregarProfessores(); carregarSolicitacoes(); carregarTodasTurmas(); } }, [token, isCoordenacao, escolaAtualId]);
  React.useEffect(() => { if (token && isProfessor) carregarConvites(); }, [token, isProfessor]);
  React.useEffect(() => { if (token && isResponsavel) carregarSolicitacoes(); }, [token, isResponsavel]);
  React.useEffect(() => { if (token && alunoSel) carregarRelatorios(); }, [alunoSel, dataSel, token]);
  React.useEffect(() => { if (token) carregarMensagens(); }, [token, chatAluno]);
  React.useEffect(() => { if (token && aba !== "chat") contarNaoLidas(); }, [token, aba]);
  React.useEffect(() => {
    if (aba === "chat" && mensagens.length > 0) marcarComoLidas(mensagens);
  }, [aba, mensagens]);
  React.useEffect(() => {
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior:"smooth" });
  }, [mensagens]);

  const getDados = (catId) => relatorios.find(r => r.categoria === catId) || {};

  // ── Atualizar relatório ──────────────────────────────────
  const atualizarCampo = async (categoria, campo, valor) => {
    if (!podeEditarRelatorio) return;
    const existente = relatorios.find(r => r.categoria === categoria);
    manterScroll(() => {
      if (existente) {
        setRelatorios(prev => prev.map(r => r.id === existente.id ? Object.assign({}, r, { [campo]: valor }) : r));
      } else {
        setRelatorios(prev => [...prev, { id: "tmp-" + Date.now(), aluno_id: alunoSel, data: toKey(dataSel), categoria, [campo]: valor }]);
      }
    });
    try {
      if (existente) {
        await api(`relatorios?id=eq.${existente.id}`, token, {
          method: "PATCH", body: JSON.stringify({ [campo]: valor })
        });
      } else {
        const novo = await api("relatorios", token, {
          method: "POST",
          body: JSON.stringify({ aluno_id: alunoSel, data: toKey(dataSel), categoria, [campo]: valor })
        });
        if (novo && novo[0]) {
          manterScroll(() => {
            setRelatorios(prev => prev.map(r =>
              r.id.toString().startsWith("tmp-") && r.categoria === categoria ? novo[0] : r
            ));
          });
        }
      }
    } catch(e) {
      showStatus("Erro ao salvar", "erro");
      carregarRelatorios();
    }
  };

  // ── Atualizar detalhe (sub-item dentro de detalhes JSON) ─
  const atualizarDetalhe = async (categoria, chave, valor) => {
    if (!podeEditarRelatorio) return;
    const existente = relatorios.find(r => r.categoria === categoria);
    const detalhesAtuais = (existente && existente.detalhes) ? existente.detalhes : {};
    const novosDetalhes = { ...detalhesAtuais, [chave]: valor };

    manterScroll(() => {
      if (existente) {
        setRelatorios(prev => prev.map(r => r.id === existente.id ? Object.assign({}, r, { detalhes: novosDetalhes }) : r));
      } else {
        setRelatorios(prev => [...prev, { id: "tmp-" + Date.now(), aluno_id: alunoSel, data: toKey(dataSel), categoria, detalhes: novosDetalhes }]);
      }
    });
    try {
      if (existente) {
        await api(`relatorios?id=eq.${existente.id}`, token, {
          method: "PATCH", body: JSON.stringify({ detalhes: novosDetalhes })
        });
      } else {
        const novo = await api("relatorios", token, {
          method: "POST",
          body: JSON.stringify({ aluno_id: alunoSel, data: toKey(dataSel), categoria, detalhes: novosDetalhes })
        });
        if (novo && novo[0]) {
          manterScroll(() => {
            setRelatorios(prev => prev.map(r =>
              r.id.toString().startsWith("tmp-") && r.categoria === categoria ? novo[0] : r
            ));
          });
        }
      }
    } catch(e) {
      showStatus("Erro ao salvar", "erro");
      carregarRelatorios();
    }
  };

  // ── Carregar escolas do coordenador ───────────────────────
  const carregarEscolas = React.useCallback(async () => {
    if (!token || !isCoordenacao || !perfil) return;
    try {
      const vinculos = await api(`escolas_coordenadores?coordenador_id=eq.${perfil.id}&select=escola:escola_id(id,nome)`, token);
      const lista = vinculos.map(v => v.escola).filter(Boolean);
      setEscolas(lista);
      // Define escola atual apenas se ainda não tiver uma definida
      setEscolaAtualId(prev => {
        if (prev && lista.find(e => e.id === prev)) return prev;
        const salva = perfil.escola_atual_id && lista.find(e => e.id === perfil.escola_atual_id);
        if (salva) return salva.id;
        return lista[0] ? lista[0].id : null;
      });
    } catch(e) { console.error(e); }
  }, [token, isCoordenacao, perfil && perfil.id, perfil && perfil.escola_atual_id]);

  // ── Trocar escola atual ────────────────────────────────────
  const trocarEscola = async (escolaId) => {
    setEscolaAtualId(escolaId);
    try {
      await api(`usuarios?id=eq.${perfil.id}`, token, {
        method: "PATCH", body: JSON.stringify({ escola_atual_id: escolaId })
      });
      // Carrega turmas diretamente com o novo escolaId, sem depender do state
      const [turmasData, todasData] = await Promise.all([
        api(`turmas?escola_id=eq.${escolaId}&select=*&order=nome`, token),
        api("turmas?select=*,escola:escola_id(nome)&order=nome", token),
      ]);
      setTurmas(turmasData);
      setTodasTurmas(todasData);
      await Promise.all([carregarSolicitacoes(), carregarAlunos()]);
      showStatus("✓ Escola alterada");
    } catch(e) { console.error(e); }
  };

  // ── Remover escola ─────────────────────────────────────────
  const removerEscola = async (id, nome) => {
    if (!window.confirm(`Tem certeza que deseja apagar a escola "${nome}"? As turmas serão apagadas, mas os alunos e responsáveis permanecerão cadastrados (sem vínculo de turma).`)) return;
    try {
      await api(`escolas?id=eq.${id}`, token, { method: "DELETE", prefer: "" });
      await carregarEscolas();
      await carregarAlunos();
      if (escolaAtualId === id) setEscolaAtualId(null);
      showStatus("✓ Escola removida");
    } catch(e) { showStatus("Erro ao remover escola", "erro"); }
  };

  // ── Criar nova escola ──────────────────────────────────────
  const criarEscola = async () => {
    if (!novaEscolaNome.trim()) { setErroEscola("Digite o nome da escola."); return; }
    setErroEscola("");
    try {
      const nova = await api("escolas", token, {
        method: "POST", body: JSON.stringify({ nome: novaEscolaNome.trim(), created_by: perfil.id })
      });
      const escolaId = nova[0].id;
      await api("escolas_coordenadores", token, {
        method: "POST", body: JSON.stringify({ escola_id: escolaId, coordenador_id: perfil.id })
      });
      setNovaEscolaNome(""); setCriandoEscola(false);
      await carregarEscolas();
      await trocarEscola(escolaId);
      showStatus("✓ Escola criada");
    } catch(e) { setErroEscola("Erro ao criar escola."); }
  };

  // ── Carregar turmas (filtradas pela escola atual se coordenação) ──
  const carregarTurmas = React.useCallback(async () => {
    if (!token) return;
    try {
      const filtro = isCoordenacao && escolaAtualId
        ? `turmas?escola_id=eq.${escolaAtualId}&select=*&order=nome`
        : "turmas?select=*&order=nome";
      const data = await api(filtro, token);
      setTurmas(data);
    } catch(e) { console.error(e); }
  }, [token, isCoordenacao, escolaAtualId]);

  // ── Carregar turmas de TODAS as escolas (para aprovar solicitações) ──
  const carregarTodasTurmas = React.useCallback(async () => {
    if (!token || !isCoordenacao) return;
    try {
      const data = await api("turmas?select=*,escola:escola_id(nome)&order=nome", token);
      setTodasTurmas(data);
    } catch(e) { console.error(e); }
  }, [token, isCoordenacao]);

  // ── Carregar professores ──────────────────────────────────
  const carregarProfessores = React.useCallback(async () => {
    if (!token) return;
    try {
      const data = await api("usuarios?tipo=eq.professor&order=nome&select=*,professores_turmas(turma_id)", token);
      setProfessores(data);
    } catch(e) { console.error(e); }
  }, [token]);

  // ── Carregar convites ─────────────────────────────────────
  const carregarConvites = React.useCallback(async () => {
    if (!token) return;
    try {
      const data = await api("convites?select=*,turma:turma_id(nome)&order=created_at.desc", token);
      setConvites(data);
    } catch(e) { console.error(e); }
  }, [token]);

  // ── Carregar solicitacoes (coordenação só vê as da escola atual) ──
  const carregarSolicitacoes = React.useCallback(async () => {
    if (!token) return;
    try {
      // Coordenação vê solicitações de TODAS as escolas que coordena (RLS já garante isso no banco)
      const data = await api("solicitacoes?select=*,turma:turma_id(nome),escola:escola_id(nome),responsavel:responsavel_id(nome,email)&order=created_at.desc", token);
      setSolicitacoes(data);
      if (isCoordenacao) setNaoLidasAdmin(data.filter(s => s.status === "pendente").length);
    } catch(e) { console.error(e); }
  }, [token, isCoordenacao]);

  // ── Criar turma (vinculada à escola atual) ─────────────────
  const criarTurma = async () => {
    if (!novaTurmaNome.trim()) { setErroTurma("Digite o nome da turma."); return; }
    if (!escolaAtualId) {
      setErroTurma("Nenhuma escola selecionada. Recarregue a página e tente novamente.");
      return;
    }
    setErroTurma("");
    try {
      const nova = await api("turmas", token, {
        method: "POST",
        body: JSON.stringify({ nome: novaTurmaNome.trim(), descricao: novaTurmaDesc.trim(), created_by: perfil.id, escola_id: escolaAtualId })
      });
      // Trava de segurança: confirma que a turma foi criada com escola_id correto
      if (nova && nova[0] && !nova[0].escola_id) {
        await api(`turmas?id=eq.${nova[0].id}`, token, {
          method: "PATCH", body: JSON.stringify({ escola_id: escolaAtualId })
        });
      }
      setNovaTurmaNome(""); setNovaTurmaDesc("");
      await carregarTurmas();
      await carregarTodasTurmas();
      showStatus("✓ Turma criada");
    } catch(e) { setErroTurma("Erro ao criar turma."); }
  };

  // ── Remover turma ────────────────────────────────────────
  const removerTurma = async (id, nome) => {
    if (!window.confirm(`Tem certeza que deseja apagar a turma "${nome}"? Os alunos vinculados ficarão sem turma.`)) return;
    try {
      await api(`turmas?id=eq.${id}`, token, { method: "DELETE", prefer: "" });
      if (turmaSel === id) setTurmaSel(null);
      await carregarTurmas();
      showStatus("✓ Turma removida");
    } catch(e) { showStatus("Erro ao remover turma", "erro"); }
  };

  // ── Enviar convite para professor (vinculado à escola atual) ──
  const enviarConvite = async (turmaId) => {
    const email = (emailConvite[turmaId] || "").trim();
    if (!email) { showStatus("Digite o email do professor", "erro"); return; }
    try {
      const profs = await api(`usuarios?email=eq.${encodeURIComponent(email)}&tipo=eq.professor`, token);
      if (profs.length === 0) { showStatus("Professor não encontrado com esse email", "erro"); return; }
      const exist = await api(`convites?email=eq.${encodeURIComponent(email)}&turma_id=eq.${turmaId}&status=eq.pendente`, token);
      if (exist.length > 0) { showStatus("Convite já enviado", "erro"); return; }
      await api("convites", token, {
        method: "POST",
        body: JSON.stringify({ turma_id: turmaId, email, created_by: perfil.id, escola_id: escolaAtualId })
      });
      setEmailConvite(prev => ({ ...prev, [turmaId]: "" }));
      await carregarConvites();
      showStatus("✓ Convite enviado");
    } catch(e) { showStatus("Erro ao enviar convite", "erro"); }
  };

  // ── Professor responde convite ────────────────────────────
  const responderConvite = async (conviteId, turmaId, aceitar) => {
    try {
      await api(`convites?id=eq.${conviteId}`, token, {
        method: "PATCH", body: JSON.stringify({ status: aceitar ? "aceito" : "recusado" })
      });
      if (aceitar) {
        // Insere na tabela de junção em vez de sobrescrever turma_id
        await api("professores_turmas", token, {
          method: "POST",
          prefer: "",
          body: JSON.stringify({ professor_id: perfil.id, turma_id: turmaId })
        });
        await carregarConvites();
        await carregarAlunos();
        showStatus("✓ Convite aceito! Saindo e entrando novamente para atualizar...");
        setTimeout(async () => {
          await sbAuth.signOut(token);
          setAuthData(null);
        }, 2500);
      } else {
        await carregarConvites();
        showStatus("Convite recusado");
      }
    } catch(e) { showStatus("Erro ao responder convite", "erro"); }
  };

  // ── Responsável cria aluno (sem turma) ───────────────────
  const criarAlunoResponsavel = async () => {
    if (!novoAlunoNome.trim()) { setErroNovoAluno("Digite o nome do aluno."); return; }
    setErroNovoAluno("");
    try {
      const novo = await api("alunos", token, {
        method: "POST",
        body: JSON.stringify({ nome: novoAlunoNome.trim(), responsavel_id: perfil.id })
      });
      setNovoAlunoNome("");
      await carregarAlunos();
      showStatus("✓ Aluno cadastrado");
      return novo && novo[0];
    } catch(e) { setErroNovoAluno("Erro ao cadastrar aluno."); }
  };

  // ── Responsável solicita entrada via email da coord ───────
  const solicitarEntrada = async () => {
    if (!solEmailCoord.trim()) { showStatus("Digite o email da coordenação", "erro"); return; }
    if (!solAlunoId) { showStatus("Selecione o aluno", "erro"); return; }
    try {
      const coords = await api(`usuarios?email=eq.${encodeURIComponent(solEmailCoord.trim())}&tipo=eq.coordenacao`, token);
      if (coords.length === 0) { showStatus("Coordenação não encontrada com esse email", "erro"); return; }
      // Busca a escola atual dessa coordenação (escola_atual_id do perfil dela)
      const coordEscolaId = coords[0].escola_atual_id;
      if (!coordEscolaId) { showStatus("Esta coordenação ainda não tem escola configurada", "erro"); return; }
      const exist = await api(`solicitacoes?aluno_id=eq.${solAlunoId}&status=eq.pendente`, token);
      if (exist.length > 0) { showStatus("Este aluno já tem solicitação pendente", "erro"); return; }
      await api("solicitacoes", token, {
        method: "POST",
        body: JSON.stringify({ responsavel_id: perfil.id, aluno_id: solAlunoId, escola_id: coordEscolaId })
      });
      setSolEmailCoord(""); setSolAlunoId("");
      await carregarSolicitacoes();
      showStatus("✓ Solicitação enviada");
    } catch(e) { showStatus("Erro ao enviar solicitação", "erro"); }
  };

  // ── Coordenação aprova/rejeita solicitação ────────────────
  const responderSolicitacao = async (sol, aprovar, turmaId) => {
    try {
      if (aprovar && !turmaId) { showStatus("Selecione uma turma para aprovar", "erro"); return; }
      const turmaEscolhida = todasTurmas.find(t => t.id === turmaId);
      const escolaFinal = turmaEscolhida ? turmaEscolhida.escola_id : sol.escola_id;
      await api(`solicitacoes?id=eq.${sol.id}`, token, {
        method: "PATCH",
        body: JSON.stringify({ status: aprovar ? "aprovado" : "rejeitado", turma_id: aprovar ? turmaId : null })
      });
      if (aprovar && sol.aluno_id) {
        await api(`alunos?id=eq.${sol.aluno_id}`, token, {
          method: "PATCH",
          body: JSON.stringify({ turma_id: turmaId, escola_id: escolaFinal })
        });
        await carregarAlunos();
      }
      await carregarSolicitacoes();
      showStatus(aprovar ? "✓ Aprovado" : "Rejeitado");
    } catch(e) { showStatus("Erro", "erro"); }
  };

  // ── Remover professor de uma turma específica ─────────────
  const removerProfessorDaTurma = async (professorId, turmaId) => {
    try {
      await api(`professores_turmas?professor_id=eq.${professorId}&turma_id=eq.${turmaId}`, token, {
        method: "DELETE", prefer: ""
      });
      await carregarProfessores();
      showStatus("✓ Professor removido da turma");
    } catch(e) { showStatus("Erro", "erro"); }
  };

  // ── Remover aluno da turma ────────────────────────────────
  const vincularAlunoTurma = async (alunoId, turmaId) => {
    try {
      const turmaEscolhida = turmaId ? todasTurmas.find(t => t.id === turmaId) : null;
      const body = turmaId
        ? { turma_id: turmaId, escola_id: turmaEscolhida ? turmaEscolhida.escola_id : escolaAtualId }
        : { turma_id: null };
      await api(`alunos?id=eq.${alunoId}`, token, {
        method: "PATCH", body: JSON.stringify(body)
      });
      await carregarAlunos();
      showStatus(turmaId ? "✓ Aluno vinculado" : "✓ Aluno removido da turma");
    } catch(e) { showStatus("Erro", "erro"); }
  };

  // ── Salvar perfil de segurança do aluno ──────────────────
  const salvarPerfilSeguranca = async (alunoId, dados) => {
    try {
      const atualizado = await api(`alunos?id=eq.${alunoId}`, token, {
        method: "PATCH", body: JSON.stringify(dados)
      });
      if (atualizado && atualizado[0]) {
        setAlunos(prev => prev.map(a => a.id === alunoId ? Object.assign({}, a, atualizado[0]) : a));
      }
      showStatus("✓ Salvo");
    } catch(e) {
      showStatus("Erro ao salvar", "erro");
      throw e;
    }
  };

  // ── Adicionar aluno ──────────────────────────────────────
  const adicionarAluno = async () => {
    const nome = novoNome.trim();
    if (!nome) { setErroAluno("Digite o nome do aluno."); return; }
    setErroAluno("");
    let responsavel_id = null;
    if (novoEmail.trim()) {
      try {
        const resp = await api(`usuarios?email=eq.${encodeURIComponent(novoEmail.trim())}&tipo=eq.responsavel`, token);
        if (resp.length === 0) { setErroAluno("Nenhum responsável com esse email encontrado."); return; }
        responsavel_id = resp[0].id;
      } catch(e) { setErroAluno("Erro ao buscar responsável."); return; }
    }
    try {
      const novo = await api("alunos", token, {
        method: "POST", body: JSON.stringify({ nome, responsavel_id })
      });
      setNovoNome(""); setNovoEmail("");
      await carregarAlunos();
      if (novo && novo[0]) { setAlunoSel(novo[0].id); setAba("relatorio"); }
      showStatus("✓ Aluno adicionado");
    } catch(e) { showStatus("Erro ao adicionar", "erro"); }
  };

  // ── Remover aluno ────────────────────────────────────────
  const removerAluno = async (id, nome) => {
    if (!window.confirm(`Tem certeza que deseja apagar "${nome || "este aluno"}"? Todos os relatórios e mensagens vinculados serão perdidos.`)) return;
    try {
      await api(`alunos?id=eq.${id}`, token, { method: "DELETE", prefer: "" });
      await carregarAlunos();
      if (alunoSel === id) {
        const restantes = alunos.filter(a => a.id !== id);
        setAlunoSel(restantes[0] ? restantes[0].id : null);
      }
      showStatus("✓ Aluno removido");
    } catch(e) { showStatus("Erro ao remover", "erro"); }
  };

  const mudarDia = (delta) => {
    const nova = new Date(dataSel);
    nova.setDate(nova.getDate() + delta);
    setDataSel(nova);
  };

  const sair = async () => {
    await sbAuth.signOut(token);
    setAuthData(null);
  };

  const nomeAluno = alunoSel ? (alunos.find(a => a.id === alunoSel) || {}).nome || "" : "";

  if (!authData) return <TelaLogin onLogin={setAuthData} />;

  const convitesPendentes = convites.filter(c => c.status === "pendente").length;

  const abas = isCoordenacao
    ? [["relatorio","📋 Relatório"],["turmas","🏫 Turmas"],["alunos","👥 Alunos"],["chat","💬 Chat"]]
    : isProfessor
    ? [["relatorio","📋 Relatório"],["alunos","👥 Alunos"],["chat","💬 Chat"]]
    : [["relatorio","📋 Relatório"],["turmas","🏫 Turma"],["chat","💬 Chat"]];

  const labelPerfil = isProfessor ? "👩‍🏫 Professor"
    : isCoordenacao ? "🏫 Coordenação"
    : "👨‍👩‍👧 Responsável";

  return (
    <div style={{ fontFamily:"'Nunito','Segoe UI',sans-serif", background:"#F7F5F0",
      minHeight:"100vh", color:"#2D2A26" }}>

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#4CAF8A 0%,#3A9B7A 100%)",
        padding:"20px 24px 0", color:"white", boxShadow:"0 4px 12px rgba(60,155,122,0.3)" }}>

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <div>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, opacity:0.8, textTransform:"uppercase" }}>
              {labelPerfil}
            </div>
            <div style={{ fontSize:20, fontWeight:800, marginTop:2 }}>{perfil ? perfil.nome : ""}</div>
            {isCoordenacao && escolas.length > 0 && (
              <div style={{ marginTop:8 }}>
                {escolas.length === 1 ? (
                  <div style={{ fontSize:12, fontWeight:700, opacity:0.9 }}>
                    🏫 {escolas[0].nome}
                  </div>
                ) : (
                  <select
                    value={escolaAtualId || ""}
                    onChange={e => trocarEscola(e.target.value)}
                    style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8,
                      color:"white", padding:"5px 10px", fontSize:12, fontWeight:700,
                      cursor:"pointer" }}>
                    {escolas.map(e => (
                      <option key={e.id} value={e.id} style={{ color:"#2D2A26" }}>🏫 {e.nome}</option>
                    ))}
                  </select>
                )}
              </div>
            )}
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {statusMsg && (
              <div style={{ background: statusMsg.tipo==="erro"
                ? "rgba(231,111,134,0.35)" : "rgba(255,255,255,0.25)",
                borderRadius:10, padding:"6px 12px", fontSize:12, fontWeight:700 }}>
                {statusMsg.msg}
              </div>
            )}
            <button onClick={sair}
              style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8,
                color:"white", padding:"6px 12px", cursor:"pointer", fontSize:12, fontWeight:700 }}>
              Sair
            </button>
          </div>
        </div>

        {/* Navegação de data — oculta na aba chat */}
        {aba !== "chat" && (
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
            <button onClick={() => mudarDia(-1)}
              style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8,
                color:"white", width:36, height:36, cursor:"pointer", fontSize:18, flexShrink:0 }}>‹</button>
            <div style={{ flex:1, textAlign:"center", fontSize:13, fontWeight:700, textTransform:"capitalize" }}>
              {formatarData(dataSel)}
            </div>
            <button onClick={() => mudarDia(1)}
              style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8,
                color:"white", width:36, height:36, cursor:"pointer", fontSize:18, flexShrink:0 }}>›</button>
            <button onClick={() => setDataSel(new Date())}
              style={{ background:"rgba(255,255,255,0.25)", border:"none", borderRadius:8,
                color:"white", padding:"0 12px", height:36, cursor:"pointer",
                fontWeight:700, fontSize:12, flexShrink:0 }}>
              Hoje
            </button>
          </div>
        )}
        {aba === "chat" && <div style={{ marginBottom:16 }} />}

        {/* Abas */}
        <div style={{ display:"flex", gap:4 }}>
          {abas.map(([a,l]) => (
            <button key={a} onClick={() => setAba(a)}
              style={{ background: aba===a ? "white" : "rgba(255,255,255,0.15)", border:"none",
                borderRadius:"10px 10px 0 0", padding:"8px 16px", cursor:"pointer",
                fontWeight:700, fontSize:13, color: aba===a ? "#3A9B7A" : "white",
                display:"inline-flex", alignItems:"center", gap:6 }}>
              {l}
              {a === "chat" && naoLidas > 0 && (
                <span style={{ background:"#E76F86", color:"white", borderRadius:"50%",
                  width:18, height:18, fontSize:10, fontWeight:800,
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {naoLidas > 9 ? "9+" : naoLidas}
                </span>
              )}
              {a === "turmas" && (isCoordenacao ? naoLidasAdmin : convitesPendentes) > 0 && (
                <span style={{ background:"#F4A261", color:"white", borderRadius:"50%",
                  width:18, height:18, fontSize:10, fontWeight:800,
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {isCoordenacao ? naoLidasAdmin : convitesPendentes}
                </span>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Conteúdo */}
      <div style={{ padding:"20px 16px", maxWidth:680, margin:"0 auto" }}>

        {erroConexao && (
          <div style={{ background:"#FEE2E2", border:"2px solid #E76F86", borderRadius:14,
            padding:16, marginBottom:16, fontSize:13, color:"#C0392B", fontWeight:600 }}>
            {erroConexao}
            <button onClick={() => { setErroConexao(""); carregarAlunos(); }}
              style={{ marginLeft:12, background:"#E76F86", border:"none", borderRadius:8,
                color:"white", padding:"4px 10px", cursor:"pointer", fontSize:12, fontWeight:700 }}>
              Tentar novamente
            </button>
          </div>
        )}

        {/* ── ABA TURMAS ── */}
        {aba === "turmas" && (
          <div>

            {/* ── COORDENAÇÃO ── */}
            {isCoordenacao && (
              <div>
                {/* Minhas Escolas */}
                <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:16,
                  boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: criandoEscola ? 14 : 0 }}>
                    <div style={{ fontWeight:800, fontSize:15 }}>🏫 Minhas Escolas ({escolas.length})</div>
                    {!criandoEscola && (
                      <button onClick={() => setCriandoEscola(true)}
                        style={{ background:"#F0FFF8", border:"2px solid #4CAF8A30", borderRadius:10,
                          padding:"6px 14px", color:"#3A9B7A", fontWeight:700, fontSize:12, cursor:"pointer" }}>
                        + Nova Escola
                      </button>
                    )}
                  </div>

                  {criandoEscola && (
                    <div style={{ marginTop:14 }}>
                      <Input label="Nome da escola" value={novaEscolaNome}
                        onChange={e => { setNovaEscolaNome(e.target.value); setErroEscola(""); }}
                        placeholder="Ex: Colégio Pequeno Príncipe" error={erroEscola} />
                      <div style={{ display:"flex", gap:8 }}>
                        <Btn variant="ghost" onClick={() => { setCriandoEscola(false); setNovaEscolaNome(""); setErroEscola(""); }} style={{ flex:1 }}>
                          Cancelar
                        </Btn>
                        <Btn onClick={criarEscola} style={{ flex:1 }}>Criar</Btn>
                      </div>
                    </div>
                  )}

                  {!criandoEscola && escolas.length > 0 && (
                    <div style={{ marginTop:14 }}>
                      {escolas.map(e => (
                        <div key={e.id} style={{ display:"flex", alignItems:"center", gap:8,
                          padding:"8px 0", borderBottom:"1px solid #F0EDE8" }}>
                          <button onClick={() => trocarEscola(e.id)}
                            style={{ flex:1, textAlign:"left", background: escolaAtualId === e.id ? "#F0FFF8" : "transparent",
                              border:"none", borderRadius:10, padding:"8px 12px", fontWeight:700, fontSize:13,
                              color: escolaAtualId === e.id ? "#3A9B7A" : "#2D2A26", cursor:"pointer" }}>
                            🏫 {e.nome} {escolaAtualId === e.id && "✓"}
                          </button>
                          <button onClick={() => removerEscola(e.id, e.nome)}
                            style={{ background:"#FEE2E2", border:"none", borderRadius:8,

                      <div key={sol.id} style={{ padding:"14px 0", borderBottom:"1px solid #F0EDE8" }}>

                  const alunosDaTurma = alunos.filter(a => a.turma_id === t.id);
                  const profsDaTurma = professores.filter(p =>
                    p.professores_turmas && p.professores_turmas.some(pt => pt.turma_id === t.id)

                        <div style={{ width:44, height:44, borderRadius:12, background:"#4CAF8A20",

                          🏫
                        </div>
                        <div style={{ flex:1, textAlign:"left" }}>
                          <div style={{ fontWeight:800, fontSize:15 }}>{t.nome}</div>

                          <div style={{ fontSize:12, fontWeight:600, marginTop:4, display:"flex", gap:12 }}>
                            <span style={{ color:"#4CAF8A" }}>👥 {alunosDaTurma.length} alunos</span>
                            <span style={{ color: profsDaTurma.length > 0 ? "#4CAF8A" : "#D4A843" }}>

                            </span>
                          </div>
                        </div>
                        <button onClick={e => { e.stopPropagation(); removerTurma(t.id, t.nome); }}
                          style={{ background:"#FEE2E2", border:"none", borderRadius:8,
                            color:"#E76F86", padding:"6px 10px", cursor:"pointer", fontWeight:700, fontSize:12 }}>
                          ✕
                        </button>
                      </button>

                      {aberta && (
                        <div style={{ padding:"0 20px 20px", borderTop:"1px solid #F0EDE8" }}>

                                  {p.nome[0]}

                                <div style={{ flex:1 }}>
                                  <div style={{ fontWeight:700, fontSize:14 }}>{p.nome}</div>
                                  <div style={{ fontSize:12, color:"#9A9590" }}>{p.email}</div>
                                </div>
                                <button onClick={() => removerProfessorDaTurma(p.id, t.id)}

                                    color:"#E76F86", padding:"6px 10px", cursor:"pointer",
                                    fontWeight:700, fontSize:12 }}>

                                </button>
                              </div>

                              </div>
                            </div>

                        </Btn>

                      style={{ background:"linear-gradient(135deg,#4CAF8A,#3A9B7A)", border:"none",

                      <div style={{ width:32, height:32, borderRadius:"50%", background:"#4CAF8A",

                        color:"white", fontWeight:700, flexShrink:0 }}>
                        {a.nome[0]}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:700, fontSize:14 }}>{a.nome}</div>
                        <div style={{ fontSize:12, color: a.turma_id ? "#4CAF8A" : "#B0ABA5", marginTop:1 }}>
                          {a.turma_id ? "✅ Vinculado à turma" : "Sem turma — solicite abaixo"}
                        </div>
                      </div>
                      {!a.turma_id && (
                        <button onClick={() => removerAluno(a.id, a.nome)}
                          style={{ background:"#FEE2E2", border:"none", borderRadius:8,
                            color:"#E76F86", padding:"6px 10px", cursor:"pointer",
                            fontWeight:700, fontSize:12 }}>
                          ✕
                        </button>
                      )}
                    </div>
                  ))}
                </div>

                {/* 2. Solicitar vaga */}
                <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:16,

                  <div style={{ fontSize:13, color:"#9A9590", marginBottom:14 }}>
                    Selecione o filho e informe o email da coordenação para solicitar a vaga.
                  </div>

                  {/* Selecionar filho sem turma */}
                  {alunos.filter(a => !a.turma_id && !solicitacoes.find(s => s.aluno_id === a.id && s.status === "pendente")).length === 0 ? (
                    <div style={{ background:"#F0FFF8", border:"2px solid #4CAF8A30", borderRadius:12,
                      padding:"12px 16px", fontSize:13, color:"#3A9B7A", fontWeight:600 }}>
                      {alunos.length === 0
                        ? "Cadastre um filho acima antes de solicitar."
                        : "✅ Todos os filhos já estão vinculados ou com solicitação pendente."}
                    </div>
                  ) : (
                    <div>
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:12, fontWeight:700, color:"#6A6560",
                          textTransform:"uppercase", letterSpacing:0.8, marginBottom:8 }}>Selecionar filho</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                          {alunos
                            .filter(a => !a.turma_id && !solicitacoes.find(s => s.aluno_id === a.id && s.status === "pendente"))

                              <button key={a.id} onClick={() => setSolAlunoId(a.id)}
                                style={{ background: solAlunoId === a.id ? "#4CAF8A" : "#F0EDE8",

                                  fontWeight:700, fontSize:13, cursor:"pointer",
                                  color: solAlunoId === a.id ? "white" : "#2D2A26" }}>
                                {a.nome}

                          padding:"12px 0", borderBottom:"1px solid #F0EDE8" }}>
                          <div style={{ fontSize:24 }}>
                            {s.status === "aprovado" ? "✅" : s.status === "rejeitado" ? "❌" : "⏳"}

                              {alunoSol ? alunoSol.nome : "Aluno"}

                            <div style={{ fontSize:12, color:"#9A9590", marginTop:2 }}>
                              {s.turma ? `Turma: ${s.turma.nome} · ` : ""}

                                : s.status === "aprovado" ? "Aprovado pela coordenação"
                                : "Não aprovado"}
                            </div>
                          </div>
                          <div style={{ fontSize:11, fontWeight:800, textTransform:"uppercase",
                            color: s.status === "aprovado" ? "#4CAF8A"

                            {s.status}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </div>

        {/* ── ABA ALUNOS ── */}

          <div>
            {isProfessor && (
              <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:16,

                <div style={{ fontWeight:800, fontSize:15, marginBottom:14 }}>➕ Adicionar Aluno</div>
                <Input label="Nome do aluno" value={novoNome}
                  onChange={e => { setNovoNome(e.target.value); setErroAluno(""); }}
                  placeholder="Ex: Maria Clara" error={erroAluno} />
                <Input label="Email do responsável (opcional)" type="email" value={novoEmail}
                  onChange={e => { setNovoEmail(e.target.value); setErroAluno(""); }}

                <Btn onClick={adicionarAluno}>Adicionar Aluno</Btn>

                  ⚠️ Alunos sem turma ({alunos.filter(a => !a.turma_id).length})

                <div style={{ fontSize:13, color:"#9A9590", marginBottom:14 }}>

                  <div key={a.id} style={{ display:"flex", alignItems:"center", gap:8,
                    padding:"10px 0", borderBottom:"1px solid #F0EDE8", flexWrap:"wrap" }}>
                    <div style={{ width:34, height:34, borderRadius:"50%", background:"#F4A261",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      color:"white", fontWeight:700, fontSize:14, flexShrink:0 }}>
                      {a.nome[0]}
                    </div>
                    <div style={{ flex:1, minWidth:80 }}>
                      <div style={{ fontWeight:700, fontSize:14 }}>{a.nome}</div>

                      )}
                    </div>
                    <select
                      value=""
                      onChange={e => { if (e.target.value) vincularAlunoTurma(a.id, e.target.value); }}

                        padding:"7px 10px", fontSize:12, background:"#FAFAF8", color:"#2D2A26" }}>
                      <option value="">Vincular à turma...</option>
                      {todasTurmas.map(t => (
                        <option key={t.id} value={t.id}>
                          {t.escola ? `${t.escola.nome} — ` : ""}{t.nome}

                    </select>
                  </div>

              </div>

              boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
