<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Agenda Escolar v1.1 -->
  <title>Agenda Escolar v1.1</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  // Carrega o app.js e executa via Babel
  fetch('app.js')
    .then(r => r.text())
    .then(code => {
      const transformed = Babel.transform(code, { presets: ['react'] }).code;
      const script = document.createElement('script');
      script.textContent = transformed;
      document.body.appendChild(script);
    })
    .catch(e => {
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;text-align:center;color:#E76F86;font-family:sans-serif">' +
        '<div style="font-size:40px;margin-bottom:12px">⚠️</div>' +
        '<div style="font-size:18px;font-weight:700">Erro ao carregar o app</div>' +
        '<div style="font-size:14px;margin-top:8px;color:#64748B">' + e.message + '</div>' +
        '</div>';
    });
</script>
</body>
</html>
