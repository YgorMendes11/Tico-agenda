                👥 Turma ({alunos.length} {alunos.length === 1 ? "aluno" : "alunos"})
              </div>
              {alunos.length === 0 && (
                <div style={{ color:"#B0ABA5", fontSize:13, textAlign:"center", padding:16 }}>
                  Nenhum aluno cadastrado ainda.
                </div>
              )}
              {alunos.map(a => {
                const expandido = alunoExpandido === a.id;
                return (
                  <div key={a.id} style={{ borderBottom:"1px solid #F0EDE8", padding:"12px 0" }}>
                    <div style={{ display:"flex", alignItems:"center" }}>
                      <div style={{ width:38, height:38, borderRadius:"50%", background:"#4CAF8A",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        color:"white", fontWeight:700, fontSize:15, marginRight:12, flexShrink:0 }}>
                        {a.nome[0]}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:700, fontSize:14 }}>{a.nome}</div>
                        {a.responsavel && a.responsavel.nome && (
                          <div style={{ fontSize:12, color:"#9A9590", marginTop:1 }}>
                            Resp: {a.responsavel.nome}
                          </div>
                        )}
                        {!a.responsavel_id && (
                          <div style={{ fontSize:12, color:"#D4A843", marginTop:1 }}>
                            Sem responsável vinculado
                          </div>
                        )}
                      </div>
                      {isProfessor && (
                        <button onClick={() => { setAlunoSel(a.id); setAba("relatorio"); }}
                          style={{ background:"#4CAF8A", border:"none", borderRadius:8,
                            color:"white", padding:"6px 14px", cursor:"pointer",
                            fontWeight:700, fontSize:12, marginRight:8 }}>
                          Ver
                        </button>
                      )}
                      <button onClick={() => setAlunoExpandido(expandido ? null : a.id)}
                        style={{ background:"#F0EDE8", border:"none", borderRadius:8,
                          color:"#6A6560", padding:"6px 12px", cursor:"pointer",
                          fontWeight:700, fontSize:12, marginRight: isCoordenacao ? 8 : 0 }}>
                        {expandido ? "▲" : "🛟"}
                      </button>
                      {isCoordenacao && (
                        <button onClick={() => removerAluno(a.id, a.nome)}
                          style={{ background:"#FEE2E2", border:"none", borderRadius:8,
                            color:"#E76F86", padding:"6px 10px", cursor:"pointer",
                            fontWeight:700, fontSize:12 }}>
                          ✕
                        </button>
                      )}
                    </div>

                    {expandido && (
                      <PerfilSeguranca
                        aluno={a}
                        podeEditar={false}
                        onSalvar={(dados) => salvarPerfilSeguranca(a.id, dados)}
                      />
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── ABA RELATÓRIO ── */}
        {aba === "relatorio" && (
          <div>
            {alunos.length === 0 ? (
              <div style={{ background:"white", borderRadius:16, padding:32,
                textAlign:"center", boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize:40, marginBottom:12 }}>👥</div>
                <div style={{ fontWeight:700, color:"#9A9590" }}>
                  {isProfessor
                    ? "Adicione alunos na aba Alunos para começar."
                    : "Nenhum aluno vinculado à sua conta."}
                </div>
              </div>
            ) : (
              <div>
                {/* Seletor de aluno */}
                <div style={{ background:"white", borderRadius:16, padding:16, marginBottom:16,
                  boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#9A9590",
                    textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Aluno</div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    {alunos.map(a => (
                      <button key={a.id} onClick={() => setAlunoSel(a.id)}
                        style={{ background: alunoSel===a.id ? "#4CAF8A" : "#F0EDE8", border:"none",
                          borderRadius:20, padding:"8px 16px", fontWeight:700, fontSize:13,
                          color: alunoSel===a.id ? "white" : "#2D2A26", cursor:"pointer" }}>
                        {a.nome}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Perfil de Segurança — responsável pode editar */}
                {isResponsavel && alunoSel && (
                  <div style={{ background:"white", borderRadius:16, padding:16, marginBottom:16,
                    boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                    <button onClick={() => setAlunoExpandido(alunoExpandido === alunoSel ? null : alunoSel)}
                      style={{ width:"100%", background:"none", border:"none", cursor:"pointer",
                        display:"flex", alignItems:"center", justifyContent:"space-between", padding:0 }}>
                      <div style={{ fontWeight:800, fontSize:14, display:"flex", alignItems:"center", gap:8 }}>
                        🛟 Perfil de Segurança
                      </div>
                      <div style={{ color:"#9A9590", fontSize:14 }}>
                        {alunoExpandido === alunoSel ? "▲" : "▼"}
                      </div>
                    </button>
                    {alunoExpandido === alunoSel && (
                      <PerfilSeguranca
                        aluno={alunos.find(a => a.id === alunoSel) || {}}
                        podeEditar={true}
                        onSalvar={(dados) => salvarPerfilSeguranca(alunoSel, dados)}
                      />
                    )}
                  </div>
                )}

                {carregando && (
                  <div style={{ textAlign:"center", color:"#9A9590", padding:20 }}>⏳ Carregando...</div>
                )}

                {/* Categorias — apenas para o professor */}
                {!carregando && isProfessor && CATEGORIAS.map(cat => {
                  const dados = getDados(cat.id);
                  const aberta = catAberta === cat.id;
                  const det = dados.detalhes || {};
                  const detalhesPreenchidos = Object.keys(det).filter(k => det[k] && det[k] !== 0).length;
                  const temDados = dados.opcao || dados.observacao || detalhesPreenchidos > 0;

                  // Resumo curto para sub-itens (mostrado quando fechado)
                  let resumoDetalhes = "";
                  if (cat.id === "alimentacao" && detalhesPreenchidos > 0) {
                    resumoDetalhes = REFEICOES.filter(r => det[r.id]).map(r => `${r.label}: ${det[r.id]}`).join(" · ");
                  }
                  if (cat.id === "higiene" && detalhesPreenchidos > 0) {
                    resumoDetalhes = ITENS_HIGIENE.filter(i => det[i.id] > 0).map(i => `${i.label}: ${det[i.id]}`).join(" · ");
                  }

                  return (
                    <div key={cat.id} style={{ background:"white", borderRadius:16, marginBottom:12,
                      boxShadow:"0 2px 8px rgba(0,0,0,0.06)", overflow:"hidden",
                      border: temDados ? `2px solid ${cat.color}40` : "2px solid transparent" }}>
                      <button onClick={() => setCatAberta(aberta ? null : cat.id)}
                        style={{ width:"100%", background:"none", border:"none", padding:"16px 20px",
                          display:"flex", alignItems:"center", cursor:"pointer", gap:12 }}>
                        <div style={{ width:40, height:40, borderRadius:12,
                          background:`${cat.color}20`, display:"flex", alignItems:"center",
                          justifyContent:"center", fontSize:18, flexShrink:0 }}>
                          {cat.icon}
                        </div>
                        <div style={{ flex:1, textAlign:"left" }}>
                          <div style={{ fontWeight:800, fontSize:14 }}>{cat.label}</div>
                          {temDados && !aberta && (
                            <div style={{ fontSize:12, color:cat.color, fontWeight:600, marginTop:2 }}>
                              {resumoDetalhes || dados.opcao || "Observação registrada"}
                            </div>
                          )}
                          {!temDados && !aberta && (
                            <div style={{ fontSize:12, color:"#B0ABA5", marginTop:2 }}>
                              {isProfessor ? "Toque para registrar" : "Sem registro"}
                            </div>
                          )}
                        </div>
                        <div style={{ color: temDados ? cat.color : "#B0ABA5", fontSize:18 }}>
                          {temDados ? "●" : "○"}
                        </div>
                      </button>

                      {aberta && (
                        <div style={{ padding:"0 20px 20px", borderTop:"1px solid #F0EDE8" }}>

                          {/* ── ALIMENTAÇÃO: status por refeição ── */}
                          {cat.id === "alimentacao" && (
                            <div style={{ marginTop:14 }}>
                              {REFEICOES.map(ref => (
                                <div key={ref.id} style={{ marginBottom:14 }}>
                                  <div style={{ fontSize:12, fontWeight:700, color:"#4A4540", marginBottom:6 }}>
                                    {ref.label}
                                  </div>
                                  <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                                    {STATUS_ALIMENTACAO.map(st => {
                                      const ativo = det[ref.id] === st;
                                      return (
                                        <button key={st}
                                          onClick={() => isProfessor && atualizarDetalhe(cat.id, ref.id, ativo ? "" : st)}
                                          style={{ background: ativo ? cat.color : "#F0EDE8",
                                            border:"none", borderRadius:20, padding:"7px 12px",
                                            fontWeight:700, fontSize:11.5,
                                            color: ativo ? "white" : "#2D2A26",
                                            cursor: isProfessor ? "pointer" : "default" }}>
                                          {st}
                                        </button>
                                      );
                                    })}
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}

                          {/* ── HIGIENE: contador por item ── */}
                          {cat.id === "higiene" && (
                            <div style={{ marginTop:14 }}>
                              {ITENS_HIGIENE.map(item => {
                                const qtd = det[item.id] || 0;
                                return (
                                  <div key={item.id} style={{ display:"flex", alignItems:"center",
                                    justifyContent:"space-between", padding:"10px 0",
                                    borderBottom:"1px solid #F5F3EF" }}>
                                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                                      <span style={{ fontSize:18 }}>{item.icon}</span>
                                      <span style={{ fontWeight:700, fontSize:13 }}>{item.label}</span>
                                    </div>
                                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                                      <button
                                        onClick={() => isProfessor && qtd > 0 && atualizarDetalhe(cat.id, item.id, qtd - 1)}
                                        disabled={!isProfessor || qtd === 0}
                                        style={{ width:30, height:30, borderRadius:8, border:"none",
                                          background:"#F0EDE8", color:"#6A6560", fontWeight:800, fontSize:16,
                                          cursor: (isProfessor && qtd > 0) ? "pointer" : "default",
                                          opacity: (isProfessor && qtd > 0) ? 1 : 0.4 }}>
                                        −
                                      </button>
                                      <span style={{ minWidth:24, textAlign:"center", fontWeight:800,
                                        fontSize:15, color: qtd > 0 ? cat.color : "#B0ABA5" }}>
                                        {qtd}
                                      </span>
                                      <button
                                        onClick={() => isProfessor && atualizarDetalhe(cat.id, item.id, qtd + 1)}
                                        disabled={!isProfessor}
                                        style={{ width:30, height:30, borderRadius:8, border:"none",
                                          background: cat.color, color:"white", fontWeight:800, fontSize:16,
                                          cursor: isProfessor ? "pointer" : "default",
                                          opacity: isProfessor ? 1 : 0.4 }}>
                                        +
                                      </button>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          {/* ── Demais categorias: opções simples ── */}
                          {cat.id !== "alimentacao" && cat.id !== "higiene" && OPCOES[cat.id].length > 0 && (
                            <div style={{ marginTop:14 }}>
                              <div style={{ fontSize:11, fontWeight:700, color:"#9A9590",
                                textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Status</div>
                              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                                {OPCOES[cat.id].map(op => (
                                  <button key={op}
                                    onClick={() => isProfessor && atualizarCampo(cat.id, "opcao", dados.opcao===op ? "" : op)}
                                    style={{ background: dados.opcao===op ? cat.color : "#F0EDE8",
                                      border:"none", borderRadius:20, padding:"8px 14px",
                                      fontWeight:700, fontSize:12,
                                      color: dados.opcao===op ? "white" : "#2D2A26",
                                      cursor: isProfessor ? "pointer" : "default" }}>
                                    {op}
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}
                          <div style={{ marginTop:14 }}>
                            <div style={{ fontSize:11, fontWeight:700, color:"#9A9590",
                              textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>
                              {cat.id === "avisos" ? "Aviso" : "Observação"}
                            </div>
                            <textarea
                              value={dados.observacao || ""}
                              onChange={e => atualizarCampo(cat.id, "observacao", e.target.value)}
                              readOnly={!isProfessor}
                              placeholder={isProfessor
                                ? (cat.id==="avisos" ? "Escreva um aviso..." : "Adicione observações...")
                                : "Sem observações."}
                              rows={3}
                              style={{ width:"100%", border:"2px solid #E8E5E0", borderRadius:12,
                                padding:"12px 14px", fontSize:13, resize:"vertical",
                                background: isProfessor ? "#FAFAF8" : "#F7F5F0", color:"#2D2A26" }}
                            />
                          </div>
                          {cat.id === "medicamento" && (
                            <div style={{ marginTop:14 }}>
                              <div style={{ fontSize:11, fontWeight:700, color:"#9A9590",
                                textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>
                                Horário / Dosagem
                              </div>
                              <input
                                value={dados.horario || ""}
                                onChange={e => atualizarCampo(cat.id, "horario", e.target.value)}
                                readOnly={!isProfessor}
                                placeholder={isProfessor ? "Ex: 10h - 5ml de dipirona" : "-"}
                                style={{ width:"100%", border:"2px solid #E8E5E0", borderRadius:12,
                                  padding:"10px 14px", fontSize:13,
                                  background: isProfessor ? "#FAFAF8" : "#F7F5F0" }}
                              />
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* Resumo do dia */}
                {!carregando && (
                  <div style={{ marginTop:8 }}>
                    <div style={{ fontWeight:800, fontSize:17, marginBottom:14, color:"#3A9B7A",
                      display:"flex", alignItems:"center", gap:8 }}>
                      📋 Resumo do Dia — {nomeAluno}
                    </div>

                    {CATEGORIAS.map(cat => {
                      const d = getDados(cat.id);
                      const det = (d && d.detalhes) || {};

                      // Monta lista de tópicos (cada item em sua própria linha)
                      let topicos = [];
                      if (cat.id === "alimentacao") {
                        topicos = REFEICOES.filter(r => det[r.id]).map(r => ({ label: r.label, valor: det[r.id] }));
                      } else if (cat.id === "higiene") {
                        topicos = ITENS_HIGIENE.filter(i => det[i.id] > 0).map(i => ({ label: i.label, valor: String(det[i.id]) }));
                      } else {
                        if (d && d.opcao) topicos.push({ label: "Status", valor: d.opcao });
                        if (d && d.horario) topicos.push({ label: "Horário", valor: d.horario });
                      }
                      const temObservacao = d && d.observacao;

                      if (topicos.length === 0 && !temObservacao) return null;

                      return (
                        <div key={cat.id} style={{ background:"white", borderRadius:18,
                          padding:"18px 20px", marginBottom:14,
                          boxShadow:"0 2px 10px rgba(0,0,0,0.06)",
                          borderLeft:`5px solid ${cat.color}` }}>

                          {/* Cabeçalho da categoria */}
                          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom: (topicos.length > 0 || temObservacao) ? 14 : 0 }}>
                            <div style={{ width:40, height:40, borderRadius:12,
                              background:`${cat.color}20`, display:"flex", alignItems:"center",
                              justifyContent:"center", fontSize:20, flexShrink:0 }}>
                              {cat.icon}
                            </div>
                            <div style={{ fontWeight:800, fontSize:17, color:"#2D2A26" }}>
                              {cat.label}
                            </div>
                          </div>

                          {/* Tópicos */}
                          {topicos.length > 0 && (
                            <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                              {topicos.map((t, i) => {
                                let marcador = "•";
                                const valorLower = String(t.valor).toLowerCase();

                                if (cat.id === "alimentacao") {
                                  if (valorLower === "comeu tudo") marcador = "✅";
                                  else if (valorLower === "mais da metade") marcador = "🙂";
                                  else if (valorLower === "menos da metade") marcador = "😕";
                                  else if (valorLower === "recusou") marcador = "❌";
                                } else if (cat.id === "higiene") {
                                  marcador = "🔁";
                                } else if (cat.id === "presenca") {
                                  if (valorLower === "presente") marcador = "✅";
                                  else if (valorLower === "ausente") marcador = "❌";
                                  else marcador = "⚠️";
                                } else if (cat.id === "comportamento") {
                                  if (valorLower === "excelente") marcador = "🌟";
                                  else if (valorLower === "bom") marcador = "⭐";
                                  else if (valorLower === "regular") marcador = "🙂";
                                  else marcador = "⚠️";
                                } else if (cat.id === "saude") {
                                  if (valorLower === "ótima" || valorLower === "boa") marcador = "💚";
                                  else if (valorLower === "regular") marcador = "🟡";
                                  else marcador = "🚨";
                                } else if (cat.id === "medicamento") {
                                  marcador = "💊";
                                } else if (t.label === "Horário") {
                                  marcador = "🕐";
                                }

                                return (
                                  <div key={i} style={{ display:"flex", alignItems:"center",
                                    gap:10, paddingLeft:4 }}>
                                    <div style={{ fontSize:18, width:24, textAlign:"center", flexShrink:0 }}>
                                      {marcador}
                                    </div>
                                    <div style={{ fontSize:15.5, color:"#4A4540" }}>
                                      <span style={{ fontWeight:700, color:"#2D2A26" }}>{t.label}: </span>
                                      {t.valor}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          {/* Observação */}
                          {temObservacao && (
                            <div style={{ marginTop: topicos.length > 0 ? 14 : 0,
                              paddingTop: topicos.length > 0 ? 14 : 0,
                              borderTop: topicos.length > 0 ? "1px solid #F0EDE8" : "none",
                              display:"flex", alignItems:"flex-start", gap:10, paddingLeft:4 }}>
                              <div style={{ fontSize:18, width:24, textAlign:"center", flexShrink:0, marginTop:1 }}>
                                {cat.id === "avisos" ? "📢" : "📝"}
                              </div>
                              <div style={{ fontSize:15.5, color:"#4A4540", lineHeight:1.5 }}>
                                <span style={{ fontWeight:700, color:"#2D2A26" }}>
                                  {cat.id === "avisos" ? "Aviso: " : "Observação: "}
                                </span>
                                {d.observacao}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}

                    {relatorios.length === 0 && (
                      <div style={{ background:"white", borderRadius:18, padding:32,
                        textAlign:"center", color:"#B0ABA5", fontSize:15,
                        boxShadow:"0 2px 10px rgba(0,0,0,0.06)" }}>
                        Nenhum registro para este dia.
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── ABA CHAT ── */}
        {aba === "chat" && (
          <TelaChat
            alunos={alunos}
            perfil={perfil}
            chatAluno={chatAluno}
            setChatAluno={setChatAluno}
            mensagens={mensagens}
            novaMensagem={novaMensagem}
            setNovaMensagem={setNovaMensagem}
            enviarMensagem={enviarMensagem}
            enviando={enviando}
            chatEndRef={chatEndRef}
          />
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
